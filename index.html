<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanças • Gestão de Saldo e Parcelas</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F3F4F6; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 9999px; }
        
        body { background: #FAF9F6; color: #2D3436; font-family: 'Quicksand', sans-serif; min-height: 100vh; }
        .hidden { display: none !important; }
        .transition-all { transition: all 0.2s ease-in-out; }
        .modal-overlay { background: rgba(45, 52, 54, 0.6); backdrop-filter: blur(4px); }
        
        .negative-balance { color: #DC2626; font-weight: 800; }
        .positive-balance { color: #059669; font-weight: 800; }
        
        .debt-tag { background: #FEE2E2; color: #991B1B; padding: 2px 10px; border-radius: 9999px; font-size: 10px; font-weight: 700; }
        
        .btn-pagar { background: #D1FAE5; color: #065F46; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; border: 1px solid #6EE7B7; cursor: pointer; transition: all 0.2s; }
        .btn-pagar:hover { background: #6EE7B7; transform: scale(1.05); }
        .btn-pagar:active { transform: scale(0.95); }
        
        .btn-delete { padding: 4px 8px; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: #9CA3AF; }
        .btn-delete:hover { background: #FEE2E2; color: #DC2626; transform: scale(1.1); }
        
        .btn-edit { padding: 4px 8px; border-radius: 8px; cursor: pointer; transition: all 0.2s; color: #60A5FA; }
        .btn-edit:hover { background: #EFF6FF; color: #2563EB; transform: scale(1.1); }
        
        .bank-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: white; }
        
        .option-card { border: 2px solid #E5E7EB; border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.2s; }
        .option-card:hover { border-color: #93C5FD; background: #F0F9FF; }
        .option-card .icon { font-size: 28px; margin-bottom: 8px; }
        
        .empty-state { text-align: center; padding: 40px 20px; }
        .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; font-weight: 700; color: #1A1A1A; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; color: #636E72; max-width: 400px; margin: 0 auto; }
        
        .btn-voltar {
            background: #E0E7FF;
            color: #4338CA;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid #A5B4FC;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-voltar:hover { background: #C7D2FE; transform: scale(1.02); }
        
        .input-field { width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 10px; font-size: 14px; background: white; }
        .input-field:focus { outline: 2px solid #93C5FD; outline-offset: 1px; }
        
        .btn { padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #BAE6FD; color: #0369A1; }
        .btn-primary:hover { background: #7DD3FC; transform: scale(1.02); }
        .btn-danger { background: #FEE2E2; color: #991B1B; }
        .btn-danger:hover { background: #FECACA; }
        .btn-success { background: #D1FAE5; color: #065F46; }
        .btn-success:hover { background: #A7F3D0; }
        
        .card { background: white; border-radius: 16px; padding: 20px; border: 1px solid #E5E7EB; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ============================================================
        // UTILITÁRIOS
        // ============================================================
        const formatCurrency = (val) => {
            return Number(val || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };

        const generateId = () => {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        };

        const bankColors = {
            'NuBank': 'bg-purple-600', 'Itaú': 'bg-orange-600', 'Bradesco': 'bg-red-600',
            'Santander': 'bg-red-700', 'Caixa': 'bg-blue-600', 'Banco do Brasil': 'bg-yellow-700',
            'Inter': 'bg-orange-500', 'C6 Bank': 'bg-black', 'Original': 'bg-green-600', 'Outro': 'bg-gray-600'
        };

        // ============================================================
        // DADOS PADRÃO - VAZIOS
        // ============================================================
        const DEFAULT_BANKS = [];
        const DEFAULT_CATEGORIES = [];
        const DEFAULT_INCOME_SOURCES = [];

        // ============================================================
        // ESTADO GLOBAL
        // ============================================================
        let state = {
            firstLogin: true,
            banks: [],
            categories: [],
            incomeSources: [],
            transactions: [],
            pendingReceipts: [],
            receivables: [],
            debts: [],
            focusedSection: 'overview',
            searchTerm: '',
            toast: null,
            showModal: false,
            modalType: 'expense',
            modalTitle: '',
            modalAmount: '',
            modalCategory: '',
            modalBank: '',
            modalDate: new Date().toISOString().split('T')[0],
            
            isEditing: false,
            editingId: null,
            
            showPaymentOptions: false,
            paymentAmount: 0,
            paymentTitle: '',
            paymentCategory: '',
            paymentDate: '',
            selectedBank: '',
            
            activeSetupTab: 'banks',
        };

        // ============================================================
        // FUNÇÕES DE ESTADO
        // ============================================================
        function loadState() {
            try {
                const saved = localStorage.getItem('finance_data_v8');
                if (saved) {
                    const data = JSON.parse(saved);
                    Object.assign(state, data);
                    return true;
                }
            } catch (e) { console.log('Erro ao carregar:', e); }
            return false;
        }

        function saveState() {
            try {
                localStorage.setItem('finance_data_v8', JSON.stringify(state));
                console.log('💾 Estado salvo!');
            } catch (e) { console.log('Erro ao salvar:', e); }
        }

        function showToast(message, type = 'success') {
            state.toast = { message, type };
            render();
            setTimeout(() => { state.toast = null; render(); }, 3500);
        }

        function getTotalBalance() { 
            return state.banks.reduce((sum, bank) => sum + Number(bank.balance || 0), 0); 
        }

        function getTotalDebts() { 
            return state.debts.reduce((sum, debt) => sum + Number(debt.amount || 0), 0); 
        }

        function getNetWorth() { 
            return getTotalBalance() - getTotalDebts(); 
        }

        function getBankBalance(bankName) {
            const bank = state.banks.find(b => b.name === bankName);
            return bank ? Number(bank.balance || 0) : 0;
        }

        // ============================================================
        // FUNÇÕES DE ADICIONAR - COM IDs
        // ============================================================
        function addBank() {
            console.log('🔍 addBank chamado');
            
            const nameInput = document.getElementById('bankNameInput');
            const balanceInput = document.getElementById('bankBalanceInput');
            
            if (!nameInput || !balanceInput) {
                showToast('❌ Erro: inputs não encontrados!', 'error');
                return;
            }
            
            const name = nameInput.value.trim();
            const balance = Number(balanceInput.value) || 0;
            
            if (!name || name === 'Selecione um banco...') {
                showToast('❌ Selecione ou digite o nome do banco!', 'error');
                return;
            }
            
            state.banks.push({
                id: generateId(),
                name: name,
                balance: balance,
                color: bankColors[name] || 'bg-gray-600',
                icon: name.charAt(0).toUpperCase(),
            });
            
            nameInput.value = '';
            balanceInput.value = '';
            
            saveState();
            render();
            showToast(`🏦 Banco ${name} adicionado!`);
            console.log('✅ Bancos:', state.banks);
        }

        function addCategory() {
            console.log('🔍 addCategory chamado');
            
            const nameInput = document.getElementById('catNameInput');
            const limitInput = document.getElementById('catLimitInput');
            
            if (!nameInput || !limitInput) {
                showToast('❌ Erro: inputs não encontrados!', 'error');
                return;
            }
            
            const name = nameInput.value.trim();
            const limit = Number(limitInput.value) || 0;
            
            if (!name) {
                showToast('❌ Digite o nome da categoria!', 'error');
                return;
            }
            
            state.categories.push({
                id: generateId(),
                name: name,
                limit: limit,
                spent: 0,
                color: 'bg-[#ECF5FC] text-sky-800 border-sky-200/60',
            });
            
            nameInput.value = '';
            limitInput.value = '';
            
            saveState();
            render();
            showToast(`📂 Categoria ${name} adicionada!`);
            console.log('✅ Categorias:', state.categories);
        }

        function addSource() {
            console.log('🔍 addSource chamado');
            
            const nameInput = document.getElementById('srcNameInput');
            const expectedInput = document.getElementById('srcExpectedInput');
            
            if (!nameInput || !expectedInput) {
                showToast('❌ Erro: inputs não encontrados!', 'error');
                return;
            }
            
            const name = nameInput.value.trim();
            const expected = Number(expectedInput.value) || 0;
            
            if (!name) {
                showToast('❌ Digite o nome da fonte!', 'error');
                return;
            }
            
            state.incomeSources.push({
                id: generateId(),
                name: name,
                expectedAmount: expected,
                color: 'bg-[#EAF7EE] text-emerald-800 border-emerald-200/60',
            });
            
            nameInput.value = '';
            expectedInput.value = '';
            
            saveState();
            render();
            showToast(`💰 Fonte ${name} adicionada!`);
            console.log('✅ Fontes:', state.incomeSources);
        }

        // ============================================================
        // FUNÇÕES DE EXCLUSÃO
        // ============================================================
        function deleteBank(id) {
            if (confirm('Excluir este banco?')) {
                state.banks = state.banks.filter(b => b.id !== id);
                saveState();
                render();
                showToast('🏦 Banco removido!');
            }
        }

        function deleteCategory(id) {
            if (confirm('Excluir esta categoria?')) {
                state.categories = state.categories.filter(c => c.id !== id);
                saveState();
                render();
                showToast('📂 Categoria removida!');
            }
        }

        function deleteSource(id) {
            if (confirm('Excluir esta fonte?')) {
                state.incomeSources = state.incomeSources.filter(s => s.id !== id);
                saveState();
                render();
                showToast('💰 Fonte removida!');
            }
        }

        function deleteTransaction(id) {
            if (!confirm('Excluir esta transação?')) return;
            
            const tx = state.transactions.find(t => t.id === id);
            if (tx) {
                const bank = state.banks.find(b => b.name === tx.bank);
                if (bank) {
                    if (tx.type === 'expense') bank.balance = (bank.balance || 0) + Number(tx.amount);
                    else if (tx.type === 'income') bank.balance = (bank.balance || 0) - Number(tx.amount);
                }
                if (tx.debtId) {
                    state.debts = state.debts.filter(d => d.id !== tx.debtId);
                }
            }
            state.transactions = state.transactions.filter(t => t.id !== id);
            showToast('🗑️ Transação removida');
            saveState();
            render();
        }

        function deleteDebt(id) {
            if (confirm('Excluir esta dívida?')) {
                state.debts = state.debts.filter(d => d.id !== id);
                showToast('⚠️ Dívida removida!');
                saveState();
                render();
            }
        }

        function deletePending(id) {
            if (confirm('Excluir este pendente?')) {
                state.pendingReceipts = state.pendingReceipts.filter(p => p.id !== id);
                showToast('⏳ Pendente removido!');
                saveState();
                render();
            }
        }

        function deleteReceivable(id) {
            if (confirm('Excluir este agendamento?')) {
                state.receivables = state.receivables.filter(r => r.id !== id);
                showToast('📅 Agendamento removido!');
                saveState();
                render();
            }
        }

        // ============================================================
        // FUNÇÕES DE EDIÇÃO
        // ============================================================
        function startEditTransaction(id) {
            const tx = state.transactions.find(t => t.id === id);
            if (!tx) return;
            
            state.isEditing = true;
            state.editingId = id;
            state.modalType = tx.type;
            state.modalTitle = tx.title;
            state.modalAmount = tx.amount;
            state.modalCategory = tx.categoryOrSource || '';
            state.modalBank = tx.bank || '';
            state.modalDate = tx.date;
            state.showModal = true;
            render();
        }

        function submitEditTransaction(e) {
            e.preventDefault();
            if (!state.modalTitle.trim() || !state.modalAmount) return;
            
            const tx = state.transactions.find(t => t.id === state.editingId);
            if (!tx) return;
            
            const oldAmount = Number(tx.amount);
            const newAmount = Number(state.modalAmount);
            const oldBank = tx.bank;
            const newBank = state.modalBank || state.banks[0]?.name;
            
            const oldBankObj = state.banks.find(b => b.name === oldBank);
            if (oldBankObj) {
                if (tx.type === 'expense') oldBankObj.balance = (oldBankObj.balance || 0) + oldAmount;
                else if (tx.type === 'income') oldBankObj.balance = (oldBankObj.balance || 0) - oldAmount;
            }
            
            tx.title = state.modalTitle.trim();
            tx.amount = newAmount;
            tx.categoryOrSource = state.modalCategory || state.categories[0]?.name;
            tx.bank = newBank;
            tx.date = state.modalDate;
            
            const newBankObj = state.banks.find(b => b.name === newBank);
            if (newBankObj) {
                if (tx.type === 'expense') newBankObj.balance = (newBankObj.balance || 0) - newAmount;
                else if (tx.type === 'income') newBankObj.balance = (newBankObj.balance || 0) + newAmount;
            }
            
            state.isEditing = false;
            state.editingId = null;
            state.showModal = false;
            state.modalTitle = '';
            state.modalAmount = '';
            
            showToast('✏️ Transação editada!');
            saveState();
            render();
        }

        // ============================================================
        // SISTEMA DE TRANSAÇÃO
        // ============================================================
        function submitTransaction(e) {
            e.preventDefault();
            if (state.isEditing) {
                submitEditTransaction(e);
                return;
            }
            
            if (!state.modalTitle.trim() || !state.modalAmount) return;
            
            const title = state.modalTitle.trim();
            const amount = Number(state.modalAmount);
            const category = state.modalCategory || state.categories[0]?.name;
            const bank = state.modalBank || state.banks[0]?.name;
            const date = state.modalDate;
            
            processTransaction(title, amount, category, bank, date);
        }

        function processTransaction(title, amount, category, bank, date) {
            const bankObj = state.banks.find(b => b.name === bank);
            if (!bankObj) {
                showToast('❌ Banco não encontrado!', 'error');
                return;
            }

            const value = Number(amount);
            
            if (state.modalType === 'income') {
                bankObj.balance = (bankObj.balance || 0) + value;
                state.transactions.push({
                    id: generateId(),
                    type: 'income',
                    title: title,
                    amount: value,
                    date: date,
                    categoryOrSource: category,
                    bank: bank,
                });
                showToast(`💰 ${formatCurrency(value)} recebido!`);
                saveState();
                render();
                return;
            }

            if ((bankObj.balance || 0) >= value) {
                bankObj.balance = (bankObj.balance || 0) - value;
                state.transactions.push({
                    id: generateId(),
                    type: 'expense',
                    title: title,
                    amount: value,
                    date: date,
                    categoryOrSource: category,
                    bank: bank,
                    paymentMethod: 'à vista',
                });
                showToast(`💸 ${formatCurrency(value)} pago!`);
                saveState();
                render();
                return;
            }

            // Saldo insuficiente
            state.paymentAmount = value;
            state.paymentTitle = title;
            state.paymentCategory = category;
            state.paymentDate = date;
            state.selectedBank = bank;
            state.showPaymentOptions = true;
            state.showModal = false;
            render();
        }

        function payWithOtherBank() {
            const value = Number(state.paymentAmount);
            const originalBank = state.selectedBank;
            const deficit = value - getBankBalance(originalBank);
            
            const banksWithBalance = state.banks.filter(b => b.name !== originalBank && (b.balance || 0) > 0);
            
            if (banksWithBalance.length === 0) {
                showToast('❌ Nenhum outro banco com saldo!', 'error');
                return;
            }

            let optionsHTML = banksWithBalance.map(b => `
                <button onclick="transferAndPay('${b.name}', ${deficit})" 
                        class="w-full text-left p-3 border rounded-xl hover:bg-slate-50 transition-all flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="${b.color} w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold">${b.icon}</div>
                        <div>
                            <span class="font-bold text-sm">${b.name}</span>
                            <span class="text-xs text-slate-500 block">Saldo: ${formatCurrency(b.balance)}</span>
                        </div>
                    </div>
                    <span class="text-sm font-bold text-emerald-600">Transferir ${formatCurrency(deficit)}</span>
                </button>
            `).join('');

            showToastDialog(
                `💰 Transferir ${formatCurrency(deficit)}`,
                `Saldo insuficiente em ${originalBank}. Escolha de onde transferir:`,
                optionsHTML
            );
        }

        function transferAndPay(fromBank, amount) {
            const originalBank = state.selectedBank;
            const from = state.banks.find(b => b.name === fromBank);
            const to = state.banks.find(b => b.name === originalBank);
            
            if (!from || !to) return;
            if ((from.balance || 0) < amount) {
                showToast(`❌ Saldo insuficiente em ${fromBank}!`, 'error');
                return;
            }

            from.balance = (from.balance || 0) - amount;
            to.balance = (to.balance || 0) + amount;
            
            state.transactions.push({
                id: generateId(),
                type: 'transfer',
                title: `Transferência: ${fromBank} → ${originalBank}`,
                amount: amount,
                date: state.paymentDate,
                fromBank: fromBank,
                toBank: originalBank,
            });

            const value = Number(state.paymentAmount);
            to.balance = (to.balance || 0) - value;
            
            state.transactions.push({
                id: generateId(),
                type: 'expense',
                title: state.paymentTitle,
                amount: value,
                date: state.paymentDate,
                categoryOrSource: state.paymentCategory,
                bank: originalBank,
                paymentMethod: 'à vista (com transferência)',
                transferredFrom: fromBank,
            });

            state.showPaymentOptions = false;
            showToast(`✅ Despesa paga usando saldo de ${fromBank}!`);
            saveState();
            render();
        }

        function setupInstallment() {
            const value = Number(state.paymentAmount);
            
            showToastDialog(
                `📅 Parcelar em até 12x`,
                `Digite o número de parcelas (2 a 12):`,
                `
                    <div class="flex gap-3 mt-4">
                        <input type="number" id="installmentCount" min="2" max="12" value="3" 
                               class="flex-1 px-4 py-3 border rounded-xl text-lg font-bold">
                        <button onclick="confirmInstallment()" 
                                class="px-6 py-3 bg-blue-500 text-white font-bold rounded-xl hover:bg-blue-600 transition-all">
                            Parcelar
                        </button>
                    </div>
                    <p class="text-xs text-slate-500 mt-2">
                        Cada parcela será de ~${formatCurrency(value/3)} (sem juros)
                    </p>
                `
            );
        }

        function confirmInstallment() {
            const count = parseInt(document.getElementById('installmentCount')?.value) || 3;
            const value = Number(state.paymentAmount);
            const bank = state.selectedBank;
            const installmentValue = value / count;
            
            const debtId = generateId();
            state.debts.push({
                id: debtId,
                title: `Parcelado: ${state.paymentTitle}`,
                amount: value,
                bank: bank,
                dueDate: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0],
                createdAt: new Date().toISOString().split('T')[0],
                status: 'pending',
                installmentCount: count,
                installmentValue: installmentValue,
                paidInstallments: 0,
                originalTitle: state.paymentTitle,
            });

            state.transactions.push({
                id: generateId(),
                type: 'expense',
                title: `${state.paymentTitle} (Parcelado em ${count}x)`,
                amount: value,
                date: state.paymentDate,
                categoryOrSource: state.paymentCategory,
                bank: bank,
                paymentMethod: `parcelado ${count}x`,
                debtId: debtId,
            });

            const bankObj = state.banks.find(b => b.name === bank);
            if (bankObj) {
                bankObj.balance = (bankObj.balance || 0) - installmentValue;
            }

            state.showPaymentOptions = false;
            showToast(`📅 Compra parcelada em ${count}x!`);
            saveState();
            render();
        }

        function cancelTransaction() {
            state.showPaymentOptions = false;
            state.showModal = false;
            showToast('❌ Transação cancelada', 'error');
            render();
        }

        // ============================================================
        // FUNÇÕES DE DÍVIDAS
        // ============================================================
        function payInstallment(debtId) {
            const debt = state.debts.find(d => d.id === debtId);
            if (!debt) return;
            
            const bank = state.banks.find(b => b.name === debt.bank);
            if (!bank) return;
            
            const installmentValue = debt.installmentValue || (debt.amount / debt.installmentCount);
            
            if ((bank.balance || 0) < installmentValue) {
                showToast('❌ Saldo insuficiente!', 'error');
                return;
            }
            
            bank.balance = (bank.balance || 0) - installmentValue;
            debt.paidInstallments = (debt.paidInstallments || 0) + 1;
            
            state.transactions.push({
                id: generateId(),
                type: 'expense',
                title: `Parcela ${debt.paidInstallments}/${debt.installmentCount}: ${debt.originalTitle}`,
                amount: installmentValue,
                date: new Date().toISOString().split('T')[0],
                categoryOrSource: debt.originalTitle || 'Parcelado',
                bank: debt.bank,
                paymentMethod: 'parcela',
                debtId: debtId,
            });
            
            if (debt.paidInstallments >= debt.installmentCount) {
                state.debts = state.debts.filter(d => d.id !== debtId);
                showToast(`✅ Dívida totalmente paga!`);
            } else {
                showToast(`✅ Parcela ${debt.paidInstallments}/${debt.installmentCount} paga!`);
            }
            
            saveState();
            render();
        }

        function payFullDebt(debtId) {
            const debt = state.debts.find(d => d.id === debtId);
            if (!debt) return;
            
            const bank = state.banks.find(b => b.name === debt.bank);
            if (!bank) return;
            
            const remaining = debt.amount - ((debt.paidInstallments || 0) * (debt.installmentValue || debt.amount / debt.installmentCount));
            
            if ((bank.balance || 0) < remaining) {
                showToast('❌ Saldo insuficiente!', 'error');
                return;
            }
            
            bank.balance = (bank.balance || 0) - remaining;
            state.transactions.push({
                id: generateId(),
                type: 'expense',
                title: `Quitação: ${debt.originalTitle}`,
                amount: remaining,
                date: new Date().toISOString().split('T')[0],
                categoryOrSource: debt.originalTitle || 'Parcelado',
                bank: debt.bank,
                paymentMethod: 'quitação antecipada',
            });
            
            state.debts = state.debts.filter(d => d.id !== debtId);
            showToast(`✅ Dívida quitada!`);
            saveState();
            render();
        }

        function addManualDebt(e) {
            e.preventDefault();
            if (!state.newDebtTitle || !state.newDebtAmount) return;
            
            state.debts.push({

                title: state.newDebtTitle.trim(),
                amount: Number(state.newDebtAmount),
                bank: state.newDebtBank || state.banks[0]?.name || 'Outro',
                dueDate: state.newDebtDueDate || new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0],
                createdAt: new Date().toISOString().split('T')[0],
                status: 'pending',

                installmentValue: Number(state.newDebtAmount),

                originalTitle: state.newDebtTitle.trim(),

            saveState();

            const pending = state.pendingReceipts.find(p => p.id === id);
            if (!pending) return;
            state.pendingReceipts = state.pendingReceipts.filter(p => p.id !== id);

            if (bank) bank.balance = (bank.balance || 0) + Number(pending.amount);
            state.transactions.push({
                id: generateId(),
                type: 'income',
                title: `[Confirmado] ${pending.title}`,
                amount: pending.amount,
                date: new Date().toISOString().split('T')[0],
                categoryOrSource: pending.source,
                bank: pending.source,

            showToast(`✅ ${formatCurrency(pending.amount)} confirmado!`);

            state.receivables = state.receivables.map(r => r.id === id ? { ...r, status: 'received' } : r);

        // ============================================================
        // FUNÇÃO DE TRANSFERÊNCIA
        // ============================================================
        function transferBetweenBanks(fromBank, toBank, amount) {
            if (fromBank === toBank) return;
            const from = state.banks.find(b => b.name === fromBank);
            const to = state.banks.find(b => b.name === toBank);
            if (!from || !to) return;
            
            const value = Number(amount);
            if ((from.balance || 0) < value) {
                showToast('❌ Saldo insuficiente!', 'error');
                return;
            }
            
            from.balance = (from.balance || 0) - value;
            to.balance = (to.balance || 0) + value;
            
            state.transactions.push({
                id: generateId(),
                type: 'transfer',
                title: `Transferência: ${fromBank} → ${toBank}`,
                amount: value,
                date: new Date().toISOString().split('T')[0],
                fromBank: fromBank,
                toBank: toBank,
            });
            
            showToast(`🔄 Transferência de ${formatCurrency(value)} realizada!`);
            saveState();
            render();
        }

        function doTransfer() {
            const from = document.getElementById('transferFrom')?.value;
            const to = document.getElementById('transferTo')?.value;
            const amount = document.getElementById('transferAmount')?.value;
            
            if (!from || !to || !amount) {
                showToast('❌ Preencha todos os campos!', 'error');
                return;
            }
            
            if (from === to) {
                showToast('❌ Não é possível transferir para o mesmo banco!', 'error');
                return;
            }
            
            transferBetweenBanks(from, to, Number(amount));
            document.getElementById('transferAmount').value = '';
        }

                            <input type="text" id="debtTitleInput" placeholder="Título" class="input-field">
                            <input type="number" id="debtAmountInput" placeholder="Valor" class="input-field">
                            <select id="debtBankInput" class="input-field">
                                <option value="">Banco</option>
                                ${state.banks.map(b => `<option value="${b.name}">${b.name}</option>`).join('')}
                            </select>
                        </div>
                        <button onclick="addManualDebtFromInputs()" class="btn btn-danger mt-2">Registrar Dívida</button>
                    </div>

                    ${state.debts.length === 0 ? `
                        <p class="text-gray-400 text-sm">Nenhuma dívida ativa</p>
                    ` : state.debts.map(debt => {
                        const isInstallment = debt.installmentCount && debt.installmentCount > 1;
                        const progress = isInstallment ? ((debt.paidInstallments || 0) / debt.installmentCount * 100) : 0;
                        const remaining = debt.amount - ((debt.paidInstallments || 0) * (debt.installmentValue || debt.amount / debt.installmentCount));
                        
                        return `
                            <div class="flex flex-col p-3 bg-red-50 border border-red-200 rounded-xl mb-2">
                                <div class="flex items-center justify-between">
                                    <div>
                                        <span class="font-bold text-sm text-red-800">${debt.title}</span>
                                        <div class="flex gap-2 text-xs text-red-600">
                                            <span>${debt.bank}</span>
                                            <span>Vence: ${debt.dueDate}</span>
                                            ${isInstallment ? `<span>${debt.paidInstallments || 0}/${debt.installmentCount}</span>` : ''}
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="font-bold text-red-600">${formatCurrency(remaining)}</span>
                                        <button onclick="deleteDebt('${debt.id}')" class="text-gray-400 hover:text-red-500">✕</button>
                                    </div>
                                </div>
                                
                                ${isInstallment ? `
                                    <div class="w-full h-2 bg-red-200 rounded-full mt-2">
                                        <div class="h-full bg-red-500 rounded-full" style="width: ${progress}%"></div>
                                    </div>
                                    <div class="flex justify-between text-xs text-slate-500 mt-1">
                                        <span>${progress.toFixed(0)}% pago</span>
                                        <span>Parcela: ${formatCurrency(debt.installmentValue || debt.amount / debt.installmentCount)}</span>
                                    </div>
                                ` : ''}
                                
                                <div class="flex gap-2 mt-2">
                                    ${isInstallment ? `
                                        <button onclick="payInstallment('${debt.id}')" class="btn-pagar flex-1 text-center">Pagar Parcela</button>
                                    ` : ''}
                                    <button onclick="payFullDebt('${debt.id}')" class="flex-1 bg-emerald-100 text-emerald-700 font-bold text-xs py-2 rounded-lg border border-emerald-300 hover:bg-emerald-200 text-center">
                                        Quitar Total
                                    </button>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            // Função para adicionar dívida manual
            window.addManualDebtFromInputs = function() {
                const title = document.getElementById('debtTitleInput')?.value;
                const amount = document.getElementById('debtAmountInput')?.value;
                const bank = document.getElementById('debtBankInput')?.value;
                
                if (!title || !amount) {
                    showToast('❌ Preencha título e valor!', 'error');
                    return;
                }
                
                state.debts.push({
                    id: generateId(),
                    title: title.trim(),
                    amount: Number(amount),
                    bank: bank || state.banks[0]?.name || 'Outro',
                    dueDate: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0],
                    createdAt: new Date().toISOString().split('T')[0],
                    status: 'pending',
                    installmentCount: 1,
                    installmentValue: Number(amount),
                    paidInstallments: 0,
                    originalTitle: title.trim(),
                });
                
                document.getElementById('debtTitleInput').value = '';
                document.getElementById('debtAmountInput').value = '';
                document.getElementById('debtBankInput').value = '';
                
                showToast('⚠️ Dívida registrada!');
                saveState();
                render();
            };

            // ============================================================
            // TRANSFERÊNCIA ENTRE BANCOS
            // ============================================================
            const transferHTML = state.banks.length >= 2 ? `
                <div class="card mb-6">
                    <h4 class="text-xs font-bold text-slate-500 uppercase mb-3">🔄 Transferir entre Bancos</h4>
                    <div class="grid grid-cols-4 gap-3">
                        <select id="transferFrom" class="input-field">
                            ${state.banks.map(b => `<option value="${b.name}">${b.name} (${formatCurrency(b.balance)})</option>`).join('')}
                        </select>
                        <select id="transferTo" class="input-field">
                            ${state.banks.map(b => `<option value="${b.name}">${b.name}</option>`).join('')}
                        </select>
                        <input type="number" id="transferAmount" placeholder="Valor" class="input-field">
                        <button onclick="doTransfer()" class="btn btn-primary">Transferir</button>
                    </div>
                </div>
            ` : '';

            // ============================================================
            // LISTA DE TRANSAÇÕES
            // ============================================================
            const filteredTransactions = state.transactions
                .filter(t => t.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || 
                             t.categoryOrSource?.toLowerCase().includes(state.searchTerm.toLowerCase()))
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            // ============================================================
            // RENDER COMPLETO
            // ============================================================
            return `
                <div class="max-w-6xl mx-auto p-6 animate-fade-in">
                    ${toastHTML}
                    ${modalHTML}
                    ${paymentOptionsHTML}

                    <!-- Header -->
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h1 class="text-2xl font-extrabold">💰 Finanças</h1>
                            <p class="text-sm text-gray-500">Gestão de Saldo e Parcelas</p>
                        </div>
                        <div class="flex gap-2 flex-wrap">
                            <button onclick="goToHome()" class="btn btn-primary">🏠 Configurar</button>
                            <button onclick="state.modalType='expense';state.isEditing=false;state.editingId=null;state.showModal=true;render()" 
                                    class="btn btn-success">+ Registrar</button>
                            <button onclick="resetApp()" class="btn btn-danger">Reset</button>
                        </div>
                    </div>

                    <!-- Cards de Resumo -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="card">
                            <p class="text-xs text-gray-500 uppercase font-bold">Saldo Total</p>
                            <p class="text-2xl font-bold ${totalBalance >= 0 ? 'text-emerald-600' : 'text-red-600'}">${formatCurrency(totalBalance)}</p>
                        </div>
                        <div class="card">
                            <p class="text-xs text-gray-500 uppercase font-bold">Dívidas</p>
                            <p class="text-2xl font-bold text-red-600">${formatCurrency(totalDebts)}</p>
                        </div>
                        <div class="card">
                            <p class="text-xs text-gray-500 uppercase font-bold">Patrimônio</p>
                            <p class="text-2xl font-bold ${netWorth >= 0 ? 'text-emerald-600' : 'text-red-600'}">${formatCurrency(netWorth)}</p>
                        </div>
                        <div class="card">
                            <p class="text-xs text-gray-500 uppercase font-bold">Transações</p>
                            <p class="text-2xl font-bold">${state.transactions.length}</p>
                        </div>
                    </div>

                    ${isNegative ? `
                        <div class="bg-red-50 border-2 border-red-300 rounded-2xl p-4 mb-6 flex items-start gap-3">
                            <div class="text-2xl">🚨</div>
                            <div>
                                <h3 class="font-extrabold text-red-800">Patrimônio Negativo!</h3>
                                <p class="text-sm text-red-700">Dívidas (${formatCurrency(totalDebts)}) > Saldo (${formatCurrency(totalBalance)})</p>
                            </div>
                        </div>
                    ` : ''}

                    ${debtsHTML}
                    ${transferHTML}

                    <!-- Bancos -->
                    <div class="card mb-6">
                        <h3 class="font-bold mb-4">🏦 Contas Bancárias</h3>
                        ${state.banks.length === 0 ? `
                            <p class="text-gray-400 text-sm">Nenhum banco cadastrado. <button onclick="goToHome()" class="text-sky-600 font-bold">Configure aqui</button></p>
                        ` : `
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                ${state.banks.map(b => `
                                    <div class="p-4 border rounded-xl ${b.balance < 0 ? 'border-red-300 bg-red-50' : 'border-gray-200'}">
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center gap-3">
                                                <div class="${b.color} w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold">${b.icon}</div>
                                                <div>
                                                    <h4 class="font-bold">${b.name}</h4>
                                                    <p class="${b.balance < 0 ? 'negative-balance' : 'positive-balance'}">${formatCurrency(b.balance)}</p>
                                                </div>
                                            </div>
                                            <button onclick="deleteBank('${b.id}')" class="text-gray-400 hover:text-red-500">✕</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>

                    <!-- Busca e Transações -->
                    <div class="card">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold">📊 Transações</h3>
                            <input type="text" placeholder="Buscar..." value="${state.searchTerm}" 
                                   oninput="state.searchTerm=this.value;render()" 
                                   class="input-field max-w-xs">
                        </div>

                        ${state.transactions.length === 0 ? `
                            <p class="text-gray-400 text-sm">Nenhuma transação registrada.</p>
                        ` : `
                            <div class="space-y-2 max-h-[400px] overflow-y-auto">
                                ${filteredTransactions.map(tx => {
                                    const isIncome = tx.type === 'income';
                                    const isTransfer = tx.type === 'transfer';
                                    return `
                                        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl border hover:shadow-sm transition-all">
                                            <div class="flex-1 min-w-0">
                                                <span class="font-bold text-sm block truncate">${tx.title}</span>
                                                <span class="text-xs text-gray-500">
                                                    ${tx.categoryOrSource || tx.fromBank || ''} • ${tx.date}
                                                    ${tx.bank ? `• ${tx.bank}` : ''}
                                                    ${tx.fromBank ? `• ${tx.fromBank} → ${tx.toBank}` : ''}
                                                </span>
                                            </div>
                                            <div class="flex items-center gap-2 ml-2">
                                                <span class="text-sm font-bold ${isIncome ? 'text-emerald-600' : isTransfer ? 'text-blue-600' : 'text-red-600'}">
                                                    ${isIncome ? '+' : isTransfer ? '🔄' : '-'}${formatCurrency(tx.amount)}
                                                </span>
                                                <button onclick="startEditTransaction('${tx.id}')" class="text-blue-400 hover:text-blue-600">✏️</button>
                                                <button onclick="deleteTransaction('${tx.id}')" class="text-gray-400 hover:text-red-500">✕</button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `}
                    </div>

                    <p class="text-center text-xs text-gray-400 mt-8">© 2026 Finanças • Gestão de Saldo e Parcelas</p>
                </div>
            `;
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        const hasSaved = loadState();
        if (!hasSaved) {
            state.banks = [...DEFAULT_BANKS];
            state.categories = [...DEFAULT_CATEGORIES];
            state.incomeSources = [...DEFAULT_INCOME_SOURCES];
        }
        render();
        console.log('🚀 App iniciado!');
        console.log('📊 Estado:', state);
    </script>
</body>
</html>
