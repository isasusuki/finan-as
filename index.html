<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanças Bento Grid</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pulse-slow { animation: pulse 2s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F3F4F6; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
        
        body {
            background: #FAF9F6;
            color: #2D3436;
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
        }
        
        .hidden { display: none !important; }
        .transition-all { transition: all 0.2s ease-in-out; }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }
        
        .bento-card {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        
        .bento-card.active {
            transform: scale(1.02);
            ring: 8px;
        }
        
        .modal-overlay {
            background: rgba(45, 52, 54, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <!-- App Container -->
    <div id="app"></div>

    <script>
        // ============================================================
        // UTILITÁRIOS
        // ============================================================
        const formatCurrency = (val) => {
            return Number(val || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

        // ============================================================
        // DADOS PADRÃO
        // ============================================================
        const DEFAULT_CATEGORIES = [
            { id: '1', name: 'Alimentação', limit: 800, spent: 0, color: 'bg-[#ECF5FC] text-sky-800 border-sky-200/60' },
            { id: '2', name: 'Transporte', limit: 350, spent: 0, color: 'bg-[#FDF1EB] text-amber-800 border-orange-200/60' },
            { id: '3', name: 'Lazer', limit: 250, spent: 0, color: 'bg-[#F5EEFB] text-purple-800 border-purple-200/60' },
            { id: '4', name: 'Moradia', limit: 1500, spent: 0, color: 'bg-[#EAF7EE] text-emerald-800 border-emerald-200/60' },
        ];

        const DEFAULT_INCOME_SOURCES = [
            { id: '1', name: 'Salário', expectedAmount: 3000, color: 'bg-[#EAF7EE] text-emerald-800 border-emerald-200/60' },
            { id: '2', name: 'Aluguel', expectedAmount: 800, color: 'bg-[#FDF1EB] text-amber-800 border-orange-200/60' },
            { id: '3', name: 'Clientes / Freelas', expectedAmount: 1200, color: 'bg-[#F5EEFB] text-purple-800 border-purple-200/60' },
            { id: '4', name: 'Outros', expectedAmount: 500, color: 'bg-[#ECF5FC] text-sky-800 border-sky-200/60' },
        ];

        const DEMO_TRANSACTIONS = [
            { id: 't1', type: 'income', title: 'Salário Junho', amount: 3200, date: '2026-06-05', categoryOrSource: 'Salário' },
            { id: 't2', type: 'expense', title: 'Supermercado Mensal', amount: 450, date: '2026-06-06', categoryOrSource: 'Alimentação' },
            { id: 't3', type: 'expense', title: 'Combustível Carro', amount: 150, date: '2026-06-08', categoryOrSource: 'Transporte' },
            { id: 't4', type: 'expense', title: 'Cinema e Jantar', amount: 120, date: '2026-06-10', categoryOrSource: 'Lazer' },
            { id: 't5', type: 'expense', title: 'Mensalidade Aluguel', amount: 1400, date: '2026-06-01', categoryOrSource: 'Moradia' },
            { id: 't6', type: 'income', title: 'Consultoria Desenvolvimento', amount: 850, date: '2026-06-12', categoryOrSource: 'Clientes / Freelas' },
        ];

        const DEMO_PENDING = [
            { id: 'p1', title: 'Transferência Pix (Venda notebook)', amount: 1200, source: 'Outros', status: 'processing', date: '2026-06-17' },
            { id: 'p2', title: 'Reembolso Despesas Viagem', amount: 340, source: 'Salário', status: 'awaiting_approval', date: '2026-06-16' }
        ];

        const DEMO_RECEIVABLES = [
            { id: 'r1', title: 'Salário Mensal Principal', amount: 3200, dueDate: '2026-07-05', source: 'Salário', reminderActive: true, status: 'pending' },
            { id: 'r2', title: 'Aluguel Sublocação Sala', amount: 600, dueDate: '2026-07-10', source: 'Aluguel', reminderActive: false, status: 'pending' },
            { id: 'r3', title: 'Projeto Design Figma', amount: 1500, dueDate: '2026-07-15', source: 'Clientes / Freelas', reminderActive: true, status: 'pending' }
        ];

        // ============================================================
        // ESTADO GLOBAL
        // ============================================================
        let state = {
            firstLogin: true,
            categories: [],
            incomeSources: [],
            transactions: [],
            pendingReceipts: [],
            receivables: [],
            focusedSection: 'expenses',
            searchTerm: '',
            toast: null,
            showModal: false,
            modalType: 'expense',
            modalTitle: '',
            modalAmount: '',
            modalCategory: '',
            modalDate: new Date().toISOString().split('T')[0],
            newPendingTitle: '',
            newPendingAmount: '',
            newPendingSource: '',
            newReceivableTitle: '',
            newReceivableAmount: '',
            newReceivableDate: '',
            newReceivableSource: '',
            newCatName: '',
            newCatLimit: 500,
            newCatColor: 'bg-[#ECF5FC] text-sky-800 border-sky-200/60',
            newSrcName: '',
            newSrcExpected: 1000,
            newSrcColor: 'bg-[#EAF7EE] text-emerald-800 border-emerald-200/60',
            activeSetupTab: 'expenses',
            loadDemo: false,
        };

        const pastelColors = [
            { name: 'Azul', bg: 'bg-[#ECF5FC] text-sky-800 border-sky-200/60' },
            { name: 'Pêssego', bg: 'bg-[#FDF1EB] text-amber-800 border-orange-200/60' },
            { name: 'Lilás', bg: 'bg-[#F5EEFB] text-purple-800 border-purple-200/60' },
            { name: 'Verde', bg: 'bg-[#EAF7EE] text-emerald-800 border-emerald-200/60' },
        ];

        // ============================================================
        // FUNÇÕES DE ESTADO
        // ============================================================
        function loadState() {
            try {
                const saved = localStorage.getItem('finance_data');
                if (saved) {
                    const data = JSON.parse(saved);
                    state.firstLogin = data.firstLogin !== undefined ? data.firstLogin : true;
                    state.categories = data.categories || DEFAULT_CATEGORIES;
                    state.incomeSources = data.incomeSources || DEFAULT_INCOME_SOURCES;
                    state.transactions = data.transactions || [];
                    state.pendingReceipts = data.pendingReceipts || [];
                    state.receivables = data.receivables || [];
                    return true;
                }
            } catch (e) {}
            return false;
        }

        function saveState() {
            try {
                localStorage.setItem('finance_data', JSON.stringify({
                    firstLogin: state.firstLogin,
                    categories: state.categories,
                    incomeSources: state.incomeSources,
                    transactions: state.transactions,
                    pendingReceipts: state.pendingReceipts,
                    receivables: state.receivables,
                }));
            } catch (e) {}
        }

        function setState(newState) {
            Object.assign(state, newState);
            saveState();
            render();
        }

        function showToast(message) {
            state.toast = message;
            render();
            setTimeout(() => {
                state.toast = null;
                render();
            }, 3000);
        }

        // ============================================================
        // FUNÇÕES DE NEGÓCIO
        // ============================================================
        function getMetrics() {
            const totalPending = state.pendingReceipts.reduce((s, i) => s + Number(i.amount), 0);
            const totalRevenue = state.transactions.filter(t => t.type === 'income').reduce((s, i) => s + Number(i.amount), 0);
            const totalReceivable = state.receivables.filter(r => r.status === 'pending').reduce((s, i) => s + Number(i.amount), 0);
            const totalExpenses = state.transactions.filter(t => t.type === 'expense').reduce((s, i) => s + Number(i.amount), 0);
            
            const updatedCategories = state.categories.map(cat => ({
                ...cat,
                spent: state.transactions.filter(t => t.type === 'expense' && t.categoryOrSource === cat.name)
                    .reduce((s, i) => s + Number(i.amount), 0)
            }));
            
            const filteredTransactions = state.transactions.filter(tx => {
                return tx.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || 
                       tx.categoryOrSource.toLowerCase().includes(state.searchTerm.toLowerCase());
            }).sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
            
            return { totalPending, totalRevenue, totalReceivable, totalExpenses, updatedCategories, filteredTransactions };
        }

        function completeOnboarding() {
            state.firstLogin = false;
            if (state.loadDemo) {
                state.transactions = [...DEMO_TRANSACTIONS];
                state.pendingReceipts = [...DEMO_PENDING];
                state.receivables = [...DEMO_RECEIVABLES];
            }
            saveState();
            render();
        }

        function addCategory(e) {
            e.preventDefault();
            if (!state.newCatName.trim()) return;
            state.categories.push({
                id: generateId(),
                name: state.newCatName.trim(),
                limit: Number(state.newCatLimit) || 0,
                spent: 0,
                color: state.newCatColor,
            });
            state.newCatName = '';
            state.newCatLimit = 500;
            saveState();
            render();
        }

        function removeCategory(id) {
            state.categories = state.categories.filter(c => c.id !== id);
            saveState();
            render();
        }

        function addSource(e) {
            e.preventDefault();
            if (!state.newSrcName.trim()) return;
            state.incomeSources.push({
                id: generateId(),
                name: state.newSrcName.trim(),
                expectedAmount: Number(state.newSrcExpected) || 0,
                color: state.newSrcColor,
            });
            state.newSrcName = '';
            state.newSrcExpected = 1000;
            saveState();
            render();
        }

        function removeSource(id) {
            state.incomeSources = state.incomeSources.filter(s => s.id !== id);
            saveState();
            render();
        }

        function createTransaction(e) {
            e.preventDefault();
            if (!state.modalTitle.trim() || !state.modalAmount) return;
            state.transactions.push({
                id: generateId(),
                type: state.modalType,
                title: state.modalTitle.trim(),
                amount: Number(state.modalAmount),
                date: state.modalDate,
                categoryOrSource: state.modalCategory || (state.modalType === 'expense' ? state.categories[0]?.name : state.incomeSources[0]?.name),
            });
            state.showModal = false;
            state.modalTitle = '';
            state.modalAmount = '';
            state.modalCategory = '';
            showToast(`${state.modalType === 'expense' ? '💸' : '💰'} Lançamento registrado!`);
            saveState();
            render();
        }

        function deleteTransaction(id) {
            state.transactions = state.transactions.filter(t => t.id !== id);
            showToast('🗑️ Transação removida');
            saveState();
            render();
        }

        function confirmPending(id) {
            const pending = state.pendingReceipts.find(p => p.id === id);
            if (!pending) return;
            state.pendingReceipts = state.pendingReceipts.filter(p => p.id !== id);
            state.transactions.push({
                id: generateId(),
                type: 'income',
                title: `[Confirmado] ${pending.title}`,
                amount: pending.amount,
                date: new Date().toISOString().split('T')[0],
                categoryOrSource: pending.source,
            });
            showToast(`✅ ${formatCurrency(pending.amount)} confirmado!`);
            saveState();
            render();
        }

        function addPending(e) {
            e.preventDefault();
            if (!state.newPendingTitle.trim() || !state.newPendingAmount) return;
            state.pendingReceipts.push({
                id: generateId(),
                title: state.newPendingTitle.trim(),
                amount: Number(state.newPendingAmount),
                source: state.newPendingSource || state.incomeSources[0]?.name || 'Outros',
                status: 'pending',
                date: new Date().toISOString().split('T')[0],
            });
            state.newPendingTitle = '';
            state.newPendingAmount = '';
            showToast('📌 Pendente registrado!');
            saveState();
            render();
        }

        function receiveReceivable(id) {
            const rec = state.receivables.find(r => r.id === id);
            if (!rec) return;
            state.receivables = state.receivables.map(r => r.id === id ? { ...r, status: 'received' } : r);
            state.transactions.push({
                id: generateId(),
                type: 'income',
                title: `[Recebido] ${rec.title}`,
                amount: rec.amount,
                date: new Date().toISOString().split('T')[0],
                categoryOrSource: rec.source,
            });
            showToast(`💰 ${formatCurrency(rec.amount)} recebido!`);
            saveState();
            render();
        }

        function addReceivable(e) {
            e.preventDefault();
            if (!state.newReceivableTitle.trim() || !state.newReceivableAmount || !state.newReceivableDate) return;
            state.receivables.push({
                id: generateId(),
                title: state.newReceivableTitle.trim(),
                amount: Number(state.newReceivableAmount),
                dueDate: state.newReceivableDate,
                source: state.newReceivableSource || state.incomeSources[0]?.name || 'Outros',
                reminderActive: true,
                status: 'pending',
            });
            state.newReceivableTitle = '';
            state.newReceivableAmount = '';
            state.newReceivableDate = '';
            showToast('📅 Agendamento criado!');
            saveState();
            render();
        }

        function toggleReminder(id) {
            state.receivables = state.receivables.map(r => 
                r.id === id ? { ...r, reminderActive: !r.reminderActive } : r
            );
            saveState();
            render();
        }

        function resetApp() {
            if (confirm('Tem certeza que deseja reiniciar todos os dados?')) {
                localStorage.clear();
                state.firstLogin = true;
                state.categories = [];
                state.incomeSources = [];
                state.transactions = [];
                state.pendingReceipts = [];
                state.receivables = [];
                state.loadDemo = false;
                render();
            }
        }

        // ============================================================
        // RENDERIZADOR
        // ============================================================
        function render() {
            const app = document.getElementById('app');
            
            if (state.firstLogin) {
                app.innerHTML = renderOnboarding();
            } else {
                app.innerHTML = renderDashboard();
            }
            
            // Re-aplicar event listeners
            attachEvents();
        }

        // ============================================================
        // RENDER ONBOARDING
        // ============================================================
        function renderOnboarding() {
            const categoriesHTML = state.categories.map(cat => `
                <div class="flex items-center justify-between p-3.5 border rounded-2xl ${cat.color}">
                    <div>
                        <span class="font-extrabold text-sm">${cat.name}</span>
                        <span class="text-[10px] font-semibold opacity-70 block">Teto: ${formatCurrency(cat.limit)}</span>
                    </div>
                    <button onclick="removeCategory('${cat.id}')" class="p-1.5 hover:bg-white/50 rounded-xl text-red-700">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            <line x1="10" y1="11" x2="10" y2="17"/>
                            <line x1="14" y1="11" x2="14" y2="17"/>
                        </svg>
                    </button>
                </div>
            `).join('');

            const sourcesHTML = state.incomeSources.map(src => `
                <div class="flex items-center justify-between p-3.5 border rounded-2xl ${src.color}">
                    <div>
                        <span class="font-extrabold text-sm">${src.name}</span>
                        <span class="text-[10px] font-semibold opacity-70 block">Meta: ${formatCurrency(src.expectedAmount)}</span>
                    </div>
                    <button onclick="removeSource('${src.id}')" class="p-1.5 hover:bg-white/50 rounded-xl text-red-700">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            <line x1="10" y1="11" x2="10" y2="17"/>
                            <line x1="14" y1="11" x2="14" y2="17"/>
                        </svg>
                    </button>
                </div>
            `).join('');

            const colorOptions = pastelColors.map(col => 
                `<option value="${col.bg}">${col.name}</option>`
            ).join('');

            return `
                <div class="min-h-screen bg-[#FAF9F6] py-12 px-6 flex flex-col items-center animate-fade-in">
                    <!-- Header -->
                    <div class="w-full max-w-4xl text-center mb-8">
                        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#E0F2FE] text-[#0369A1] border border-[#7DD3FC]/40 text-xs font-semibold mb-4">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path d="M12 3v1m0 16v1M4 12H3m18 0h-1M18.364 5.636l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 7a5 5 0 100 10 5 5 0 000-10z"/>
                            </svg>
                            Configurar Primeiro Acesso
                        </div>
                        <h1 class="text-4xl md:text-5xl font-extrabold text-[#1A1A1A] mb-4">Bem-vindo ao seu App de Finanças!</h1>
                        <p class="text-base md:text-lg text-[#636E72] max-w-2xl mx-auto">
                            Vamos planejar e organizar suas despesas para você entender exatamente <strong>de onde sai o seu dinheiro</strong>.
                        </p>
                    </div>

                    <!-- Bento Grid Zerado -->
                    <div class="w-full max-w-4xl mb-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-[#F3E8FF] rounded-[30px] p-6 border-2 border-[#D8B4FE] min-h-[120px]">
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-purple-600">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                            <circle cx="12" cy="12" r="10"/>
                                            <polyline points="12 6 12 12 16 14"/>
                                        </svg>
                                    </div>
                                    <h3 class="text-lg font-bold text-[#5B21B6]">Receber Pendente</h3>
                                </div>
                                <p class="text-3xl font-extrabold text-[#4C1D95]">R$ 0,00</p>
                            </div>
                            <div class="bg-[#DCFCE7] rounded-[30px] p-6 border-2 border-[#86EFAC] min-h-[120px]">
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-emerald-600">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                                            <polyline points="17 6 23 6 23 12"/>
                                        </svg>
                                    </div>
                                    <h3 class="text-lg font-bold text-[#166534]">Receita</h3>
                                </div>
                                <p class="text-3xl font-extrabold text-[#064E3B]">R$ 0,00</p>
                            </div>
                            <div class="bg-[#FFEDD5] rounded-[30px] p-6 border-2 border-[#FDBA74] min-h-[120px]">
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-amber-600">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                            <line x1="16" y1="2" x2="16" y2="6"/>
                                            <line x1="8" y1="2" x2="8" y2="6"/>
                                            <line x1="3" y1="10" x2="21" y2="10"/>
                                        </svg>
                                    </div>
                                    <h3 class="text-lg font-bold text-[#9A3412]">A Receber</h3>
                                </div>
                                <p class="text-3xl font-extrabold text-[#7C2D12]">R$ 0,00</p>
                            </div>
                            <div class="bg-[#E0F2FE] rounded-[30px] p-6 border-2 border-[#7DD3FC] min-h-[120px]">
                                <div class="flex items-center gap-3 mb-4">
                                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-sky-600">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                            <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>
                                            <polyline points="17 18 23 18 23 12"/>
                                        </svg>
                                    </div>
                                    <h3 class="text-lg font-bold text-[#075985]">Gastos</h3>
                                </div>
                                <p class="text-3xl font-extrabold text-[#0C4A6E]">R$ 0,00</p>
                            </div>
                        </div>
                    </div>

                    <!-- Setup Card -->
                    <div class="w-full max-w-4xl bg-white p-6 rounded-3xl shadow-sm mb-8">
                        <!-- Tabs -->
                        <div class="flex bg-slate-100 p-1.5 rounded-2xl max-w-sm mx-auto mb-6">
                            <button onclick="state.activeSetupTab='expenses';render()" 
                                    class="flex-1 py-2.5 text-xs font-bold rounded-xl transition-all ${state.activeSetupTab === 'expenses' ? 'bg-[#E0F2FE] text-[#0369A1]' : 'text-[#636E72]'}">
                                Limites das Categorias
                            </button>
                            <button onclick="state.activeSetupTab='revenue';render()" 
                                    class="flex-1 py-2.5 text-xs font-bold rounded-xl transition-all ${state.activeSetupTab === 'revenue' ? 'bg-[#EAF7EE] text-[#15803D]' : 'text-[#636E72]'}">
                                Fontes de Renda
                            </button>
                        </div>

        // ============================================================

                                                    <polyline points="3 6 5 6 21 6"/>

                                        <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-amber-600">
                                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                                <line x1="16" y1="2" x2="16" y2="6"/>
                                                <line x1="8" y1="2" x2="8" y2="6"/>
                                                <line x1="3" y1="10" x2="21" y2="10"/>
                                            </svg>
                                        </div>
                                        <h3 class="text-lg font-bold text-[#9A3412]">A Receber</h3>
                                    </div>
                                    <p class="text-3xl font-extrabold text-[#7C2D12]">${formatCurrency(totalReceivable)}</p>
                                </div>

                                <!-- Expenses -->
                                <div onclick="state.focusedSection='expenses';render()" 
                                     class="rounded-[30px] p-6 flex flex-col justify-between min-h-[140px] cursor-pointer transition-all border-2 ${state.focusedSection === 'expenses' ? 'bg-[#E0F2FE] border-[#38BDF8] ring-8 ring-[#E0F2FE]/60' : 'bg-[#E0F2FE]/90 border-[#7DD3FC] hover:border-[#38BDF8]'}">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-sky-600">
                                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                                <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>
                                                <polyline points="17 18 23 18 23 12"/>
                                            </svg>
                                        </div>
                                        <h3 class="text-lg font-bold text-[#075985]">Gastos</h3>
                                    </div>
                                    <p class="text-3xl font-extrabold text-[#0C4A6E]">${formatCurrency(totalExpenses)}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Detalhes -->
                        <div class="bg-white rounded-3xl border border-slate-200/60 shadow-sm overflow-hidden">
                            <div class="bg-[#FAF9F6] border-b border-slate-200/60 p-4 flex flex-wrap items-center gap-3">
                                <div class="flex bg-white p-1 rounded-2xl border border-slate-200/50">
                                    ${['expenses', 'revenue', 'receivables', 'pending'].map(tab => {
                                        const labels = { expenses: '💸 Gastos', revenue: '📈 Receitas', receivables: '📅 A Receber', pending: '⏳ Pendentes' };
                                        const colors = { expenses: 'bg-[#ECF5FC] text-sky-800', revenue: 'bg-[#EAF7EE] text-emerald-800', receivables: 'bg-[#FDF1EB] text-amber-800', pending: 'bg-[#F5EEFB] text-purple-800' };
                                        return `
                                            <button onclick="state.focusedSection='${tab}';render()" 
                                                    class="px-4 py-2.5 text-xs font-bold rounded-xl transition-all ${state.focusedSection === tab ? colors[tab] : 'text-[#636E72]'}">
                                                ${labels[tab]}
                                            </button>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                            <div class="p-6">
                                ${sectionHTML}
                            </div>
                        </div>
                    </main>

                    <!-- Footer -->
                    <footer class="bg-white border-t py-6 mt-12 text-center text-xs text-slate-400">
                        <p>© 2026 Finanças Pessoais • Design Bento Grid</p>
                    </footer>
                </div>
            `;
        }

        // ============================================================
        // ATTACH EVENTS
        // ============================================================
        function attachEvents() {
            // Eventos já estão inline nos elementos HTML
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        const hasSaved = loadState();
        if (!hasSaved) {
            state.categories = [...DEFAULT_CATEGORIES];
            state.incomeSources = [...DEFAULT_INCOME_SOURCES];
        }
        render();
    </script>
</body>
</html>
