<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanças Bento Grid • Gestão Acolhedora</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>
    
    <style>
        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
        .animate-pulse-slow { animation: pulse 2s ease-in-out infinite; }
        
        /* Scrollbar Customizada */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #F3F4F6; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
        
        /* Estilos Globais */
        body {
            background: #FAF9F6;
            color: #2D3436;
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        * {
            box-sizing: border-box;
        }
        
        /* Transições suaves */
        .transition-all { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React e ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <!-- Código Completo da Aplicação -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ============================================================
        // 1. COMPONENTE DE ÍCONES
        // ============================================================
        const Icon = ({ name, className = "w-5 h-5", strokeWidth = 2.5 }) => {
            const icons = {
                clock: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                ),
                'trending-up': (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                        <polyline points="17 6 23 6 23 12" />
                    </svg>
                ),
                'trending-down': (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <polyline points="23 18 13.5 8.5 8.5 13.5 1 6" />
                        <polyline points="17 18 23 18 23 12" />
                    </svg>
                ),
                calendar: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                ),
                sparkles: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <path d="M12 3v1m0 16v1M4 12H3m18 0h-1M18.364 5.636l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 7a5 5 0 100 10 5 5 0 000-10z" />
                    </svg>
                ),
                'arrow-right': (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                ),
                plus: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                ),
                trash: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        <line x1="10" y1="11" x2="10" y2="17" />
                        <line x1="14" y1="11" x2="14" y2="17" />
                    </svg>
                ),
                'alert-triangle': (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3ZM12 9v4m0 4h.01" />
                    </svg>
                ),
                check: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                ),
                bell: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9Zm-4.27 13a2 2 0 0 1-3.46 0" />
                    </svg>
                ),
                'bell-off': (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <path d="M13.73 21a2 2 0 0 1-3.46 0m5.12-7.85A5.96 5.96 0 0 0 18 8c0-2-.72-3.83-1.9-5.2M3 3l18 18" />
                    </svg>
                ),
                'rotate-ccw': (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <path d="M1 4v6h6M2.05 13.5a9 9 0 1 1 .55-5.5L1 10" />
                    </svg>
                ),
                search: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                ),
                x: (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                ),
                'chevron-right': (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                ),
                'thumbs-up': (
                    <svg className={className} fill="none" stroke="currentColor" strokeWidth={strokeWidth} viewBox="0 0 24 24">
                        <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" />
                    </svg>
                ),
            };
            return icons[name] || null;
        };

        // ============================================================
        // 2. UTILITÁRIOS E DADOS PADRÃO
        // ============================================================
        const formatCurrency = (val) => {
            return Number(val || 0).toLocaleString('pt-BR', { 
                style: 'currency', 
                currency: 'BRL' 
            });
        };

        const DEFAULT_CATEGORIES = [
            { id: '1', name: 'Alimentação', limit: 800, spent: 0, color: 'bg-[#ECF5FC] text-sky-800 border-sky-200/60' },
            { id: '2', name: 'Transporte', limit: 350, spent: 0, color: 'bg-[#FDF1EB] text-amber-800 border-orange-200/60' },
            { id: '3', name: 'Lazer', limit: 250, spent: 0, color: 'bg-[#F5EEFB] text-purple-800 border-purple-200/60' },
            { id: '4', name: 'Moradia', limit: 1500, spent: 0, color: 'bg-[#EAF7EE] text-emerald-800 border-emerald-200/60' },
        ];

        const DEFAULT_INCOME_SOURCES = [
            { id: '1', name: 'Salário', expectedAmount: 3000, color: 'bg-[#EAF7EE] text-emerald-800 border-emerald-200/60' },
            { id: '2', name: 'Aluguel', expectedAmount: 800, color: 'bg-[#FDF1EB] text-amber-800 border-orange-200/60' },
            { id: '3', name: 'Clientes / Freelas', expectedAmount: 1200, color: 'bg-[#F5EEFB] text-purple-800 border-purple-200/60' },
            { id: '4', name: 'Outros', expectedAmount: 500, color: 'bg-[#ECF5FC] text-sky-800 border-sky-200/60' },
        ];

        const INITIAL_PENDING = [
            { id: 'p1', title: 'Transferência Pix (Venda notebook)', amount: 1200, source: 'Outros', status: 'processing', date: '2026-06-17' },
            { id: 'p2', title: 'Reembolso Despesas Viagem', amount: 340, source: 'Salário', status: 'awaiting_approval', date: '2026-06-16' }
        ];

        const INITIAL_RECEIVABLES = [
            { id: 'r1', title: 'Salário Mensal Principal', amount: 3200, dueDate: '2026-07-05', source: 'Salário', reminderActive: true, status: 'pending' },
            { id: 'r2', title: 'Aluguel Sublocação Sala', amount: 600, dueDate: '2026-07-10', source: 'Aluguel', reminderActive: false, status: 'pending' },
            { id: 'r3', title: 'Projeto Design Figma (TechCorp)', amount: 1500, dueDate: '2026-07-15', source: 'Clientes / Freelas', reminderActive: true, status: 'pending' }
        ];

        const DEMO_TRANSACTIONS = [
            { id: 't1', type: 'income', title: 'Salário Junho', amount: 3200, date: '2026-06-05', categoryOrSource: 'Salário' },
            { id: 't2', type: 'expense', title: 'Supermercado Mensal', amount: 450, date: '2026-06-06', categoryOrSource: 'Alimentação' },
            { id: 't3', type: 'expense', title: 'Combustível Carro', amount: 150, date: '2026-06-08', categoryOrSource: 'Transporte' },
            { id: 't4', type: 'expense', title: 'Cinema e Jantar', amount: 120, date: '2026-06-10', categoryOrSource: 'Lazer' },
            { id: 't5', type: 'expense', title: 'Mensalidade Aluguel', amount: 1400, date: '2026-06-01', categoryOrSource: 'Moradia' },
            { id: 't6', type: 'income', title: 'Consultoria Desenvolvimento', amount: 850, date: '2026-06-12', categoryOrSource: 'Clientes / Freelas' },
        ];

        // ============================================================
        // 3. TELA DE ONBOARDING
        // ============================================================
        function Onboarding({ onComplete }) {
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [incomeSources, setIncomeSources] = useState(DEFAULT_INCOME_SOURCES);
            
            const [newCatName, setNewCatName] = useState('');
            const [newCatLimit, setNewCatLimit] = useState(500);
            const [newCatColor, setNewCatColor] = useState('bg-[#ECF5FC] text-sky-800 border-sky-200/60');
            
            const [newSrcName, setNewSrcName] = useState('');
            const [newSrcExpected, setNewSrcExpected] = useState(1000);
            const [newSrcColor, setNewSrcColor] = useState('bg-[#EAF7EE] text-emerald-800 border-emerald-200/60');
            
            const [loadDemoData, setLoadDemoData] = useState(false);
            const [activeSetupTab, setActiveSetupTab] = useState('expenses');

            const pastelColorOptions = [
                { name: 'Azul', bg: 'bg-[#ECF5FC] text-sky-800 border-sky-200/60' },
                { name: 'Pêssego', bg: 'bg-[#FDF1EB] text-amber-800 border-orange-200/60' },
                { name: 'Lilás', bg: 'bg-[#F5EEFB] text-purple-800 border-purple-200/60' },
                { name: 'Verde', bg: 'bg-[#EAF7EE] text-emerald-800 border-emerald-200/60' },
            ];

            const handleAddCategory = (e) => {
                e.preventDefault();
                if (!newCatName.trim()) return;
                const newCat = {
                    id: Date.now().toString(),
                    name: newCatName.trim(),
                    limit: Number(newCatLimit) || 0,
                    spent: 0,
                    color: newCatColor,
                };
                setCategories([...categories, newCat]);
                setNewCatName('');
                setNewCatLimit(500);
            };

            const handleAddSource = (e) => {
                e.preventDefault();
                if (!newSrcName.trim()) return;
                const newSrc = {
                    id: Date.now().toString(),
                    name: newSrcName.trim(),
                    expectedAmount: Number(newSrcExpected) || 0,
                    color: newSrcColor,
                };
                setIncomeSources([...incomeSources, newSrc]);
                setNewSrcName('');
                setNewSrcExpected(1000);
            };

            const removeCategory = (id) => {
                setCategories(categories.filter(c => c.id !== id));
            };

            const removeSource = (id) => {
                setIncomeSources(incomeSources.filter(s => s.id !== id));
            };

            return (
                <div className="min-h-screen bg-[#FAF9F6] text-[#2D3436] py-12 px-6 flex flex-col justify-between items-center animate-fade-in">
                    <div className="w-full max-w-4xl mx-auto text-center mt-4 mb-8">
                        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#E0F2FE] text-[#0369A1] border border-[#7DD3FC]/40 text-xs font-semibold mb-4 tracking-wide">
                            <Icon name="sparkles" className="w-3.5 h-3.5" />
                            Configurar Primeiro Acesso
                        </div>
                        <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-[#1A1A1A] mb-4">
                            Bem-vindo ao seu App de Finanças!
                        </h1>
                        <p className="text-base md:text-lg text-[#636E72] max-w-2xl mx-auto leading-relaxed">
                            Vamos planejar e organizar suas despesas para você entender exatamente <strong>de onde sai o seu dinheiro</strong>.
                        </p>
                    </div>

                    <div className="w-full max-w-4xl mx-auto mb-8 space-y-4">
                        <span className="text-xs font-bold tracking-wider text-[#636E72]/80 uppercase block text-center">
                            Visualização Inicial do Bento Grid Zerado
                        </span>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-[#F3E8FF] rounded-[30px] p-6 border-2 border-[#D8B4FE] flex flex-col justify-between min-h-[140px] transition-all">
                                <div className="flex items-center gap-3">
                                    <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-purple-600 shadow-sm">
                                        <Icon name="clock" className="w-6 h-6" />
                                    </div>
                                    <h3 className="text-lg font-bold text-[#5B21B6]">Receber Pendente</h3>
                                </div>
                                <div className="mt-4">
                                    <p className="text-xs text-[#7C3AED] font-medium uppercase tracking-wider mb-0.5">Em Compensação</p>
                                    <p className="text-3xl font-extrabold text-[#4C1D95]">R$ 0,00</p>
                                </div>
                            </div>

                            <div className="bg-[#DCFCE7] rounded-[30px] p-6 border-2 border-[#86EFAC] flex flex-col justify-between min-h-[140px] transition-all">
                                <div className="flex items-center gap-3">
                                    <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-emerald-600 shadow-sm">
                                        <Icon name="trending-up" className="w-6 h-6" />
                                    </div>
                                    <h3 className="text-lg font-bold text-[#166534]">Receita</h3>
                                </div>
                                <div className="mt-4">
                                    <p className="text-xs text-[#15803D] font-medium uppercase tracking-wider mb-0.5">Confirmadas</p>
                                    <p className="text-3xl font-extrabold text-[#064E3B]">R$ 0,00</p>
                                </div>
                            </div>

                            <div className="bg-[#FFEDD5] rounded-[30px] p-6 border-2 border-[#FDBA74] flex flex-col justify-between min-h-[140px] transition-all">
                                <div className="flex items-center gap-3">
                                    <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-amber-600 shadow-sm">
                                        <Icon name="calendar" className="w-6 h-6" />
                                    </div>
                                    <h3 className="text-lg font-bold text-[#9A3412]">A Receber</h3>
                                </div>
                                <div className="mt-4">
                                    <p className="text-xs text-[#C2410C] font-semibold uppercase tracking-wider mb-0.5">Agendamentos Futuros</p>
                                    <p className="text-3xl font-extrabold text-[#7C2D12]">R$ 0,00</p>
                                </div>
                            </div>

                            <div className="bg-[#E0F2FE] rounded-[30px] p-6 border-2 border-[#7DD3FC] flex flex-col justify-between min-h-[140px] transition-all">
                                <div className="flex items-center gap-3">
                                    <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-sky-600 shadow-sm">
                                        <Icon name="trending-down" className="w-6 h-6" />
                                    </div>
                                    <h3 className="text-lg font-bold text-[#075985]">Gastos</h3>
                                </div>
                                <div className="mt-4">
                                    <p className="text-xs text-[#0369A1] font-semibold uppercase tracking-wider mb-0.5">Total Planejado</p>
                                    <p className="text-3xl font-extrabold text-[#0C4A6E]">R$ 0,00</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="w-full max-w-4xl bg-white p-6 sm:p-8 rounded-3xl border border-[#FAF9F6] shadow-sm mb-12">
                        <div className="flex bg-slate-100 p-1.5 rounded-2xl gap-1.5 max-w-sm mx-auto mb-6">
                            <button
                                type="button"
                                onClick={() => setActiveSetupTab('expenses')}
                                className={`flex-1 py-2.5 text-xs font-bold rounded-xl transition-all ${
                                    activeSetupTab === 'expenses' ? 'bg-[#E0F2FE] text-[#0369A1] shadow-2xs' : 'text-[#636E72] hover:text-[#2D3436]'
                                }`}
                            >
                                Limites das Categorias
                            </button>
                            <button
                                type="button"
                                onClick={() => setActiveSetupTab('revenue')}
                                className={`flex-1 py-2.5 text-xs font-bold rounded-xl transition-all ${
                                    activeSetupTab === 'revenue' ? 'bg-[#EAF7EE] text-[#15803D] shadow-2xs' : 'text-[#636E72] hover:text-[#2D3436]'
                                }`}
                            >
                                Fontes de Renda
                            </button>
                        </div>

                        {activeSetupTab === 'expenses' && (
                            <div className="space-y-6">
                                <p className="text-xs text-[#636E72] text-center max-w-md mx-auto">
                                    Configure os limites máximos de gastos para o cálculo do aviso de orçamento. Sua conta começa zerada.
                                </p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {categories.map(cat => (
                                        <div key={cat.id} className={`flex items-center justify-between p-3.5 border rounded-2xl ${cat.color}`}>
                                            <div className="flex flex-col">
                                                <span className="font-extrabold text-sm">{cat.name}</span>
                                                <span className="text-[10px] font-semibold opacity-70">Teto Planejado: {formatCurrency(cat.limit)}</span>
                                            </div>
                                            <button
                                                type="button"
                                                onClick={() => removeCategory(cat.id)}
                                                className="p-1.5 hover:bg-white/50 rounded-xl transition-all text-red-700 cursor-pointer"
                                            >
                                                <Icon name="trash" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    ))}
                                </div>

                                <form onSubmit={handleAddCategory} className="bg-[#FAF9F6] p-4 rounded-3xl border border-slate-200/50 space-y-3">
                                    <span className="text-[10px] uppercase font-bold text-slate-500 block">Adicionar Nova Categoria</span>
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <input
                                            type="text"
                                            required
                                            placeholder="Ex: Assinaturas / Estudo"
                                            value={newCatName}
                                            onChange={(e) => setNewCatName(e.target.value)}
                                            className="bg-white px-3.5 py-2 text-xs rounded-xl border border-slate-300 focus:outline-none flex-1"
                                        />
                                        <input
                                            type="number"
                                            required
                                            placeholder="Limite R$"
                                            value={newCatLimit}
                                            onChange={(e) => setNewCatLimit(Number(e.target.value))}
                                            className="bg-white px-3.5 py-2 text-xs rounded-xl border border-slate-300 focus:outline-none w-32"
                                        />
                                        <select
                                            value={newCatColor}
                                            onChange={(e) => setNewCatColor(e.target.value)}
                                            className="bg-white px-3 py-2 text-xs rounded-xl border border-slate-300 focus:outline-none"
                                        >
                                            {pastelColorOptions.map(col => (
                                                <option key={col.bg} value={col.bg}>{col.name}</option>
                                            ))}
                                        </select>
                                        <button
                                            type="submit"
                                            className="bg-slate-900 text-white font-bold text-xs px-4 py-2 rounded-xl hover:bg-slate-800 transition-all cursor-pointer flex items-center justify-center gap-1 shrink-0"
                                        >
                                            <Icon name="plus" className="w-4 h-4" /> Incluir
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {activeSetupTab === 'revenue' && (
                            <div className="space-y-6">
                                <p className="text-xs text-[#636E72] text-center max-w-md mx-auto">
                                    Determine suas fontes esperadas de recebimentos e prospecções para organizar o fluxo de entrada.
                                </p>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {incomeSources.map(src => (
                                        <div key={src.id} className={`flex items-center justify-between p-3.5 border rounded-2xl ${src.color}`}>
                                            <div className="flex flex-col">
                                                <span className="font-extrabold text-sm">{src.name}</span>
                                                <span className="text-[10px] font-semibold opacity-70">Meta Mensal: {formatCurrency(src.expectedAmount)}</span>
                                            </div>
                                            <button
                                                type="button"
                                                onClick={() => removeSource(src.id)}
